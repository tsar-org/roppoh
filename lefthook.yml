pre-commit:
  parallel: true
  commands:
    install:
      run: bun install --frozen-lockfile
    oxfmt:
      stage_fixed: true
      exclude: "**/*.png"
      run: bun run oxfmt
    oxlint:
      stage_fixed: true
      run: bun run oxlint
    build:
      run: turbo build
    type-check:
      run: bun run type-check && turbo type-check
    cf-typegen:
      stage_fixed: true
      run: turbo cf-typegen
    knip:
      run: bun run knip
