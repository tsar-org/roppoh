pre-commit:
  parallel: true
  commands:
    install:
      run: bun install --frozen-lockfile
    oxfmt:
      stage_fixed: true
      run: bun oxfmt {staged_files} --write
    oxlint:
      stage_fixed: true
      run: bun oxlint {staged_files} --fix
    build:
      run: turbo build
    type-check:
      run: bun run type-check && turbo type-check
    cf-typegen:
      stage_fixed: true
      run: turbo cf-typegen
    knip:
      run: bun run knip
    env-encrypt:
      stage_fixed: true
      run: mise run env-encrypt
