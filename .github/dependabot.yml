# https://docs.github.com/ja/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⬆️ "
      prefix-development: "⬆️ "
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1
    commit-message:
      prefix: "⬆️ "
      prefix-development: "⬆️ "
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "bun"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vitest:
        patterns:
          - "vitest"
          - "vitest-browser-react"
          - "@vitest/ui"
          - "@vitest/browser-playwright"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⬆️ "
      prefix-development: "⬆️ "
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "docker"
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⬆️ "
      prefix-development: "⬆️ "
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "docker-compose"
